<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>社員を守りたい社長はリアライズクラブに入りなさい</title>
<style>
html,body{margin:0;padding:0;height:100%;font-family:"Hiragino Sans","Yu Gothic",sans-serif;background:#1a1a1a;color:#fff;}
.wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;box-sizing:border-box;text-align:center;}
h1{font-size:22px;line-height:1.5;margin:0 0 8px;font-weight:500;}
.sub{font-size:14px;color:#aaa;margin:0 0 32px;}
.btns{display:flex;flex-direction:column;gap:16px;width:100%;max-width:320px;}
a.btn{display:block;padding:18px 24px;background:#c9a876;color:#1a1a1a;text-decoration:none;border-radius:8px;font-weight:bold;font-size:16px;}
a.btn.sec{background:#333;color:#fff;border:1px solid #555;}
.note{font-size:12px;color:#888;margin-top:24px;}
</style>
</head>
<body>
<div class="wrap">
<h1>社員を守りたい社長は<br>リアライズクラブに入りなさい</h1>
<p class="sub">お使いの端末に合わせてお選びください</p>
<div class="btns">
<a class="btn" id="recommended" href="mobile.html">📱 スマホ版を開く</a>
<a class="btn sec" id="alt" href="pc.html">💻 PC版を開く</a>
</div>
<p class="note">※ 音声再生はiPhoneの消音モードを解除してください</p>
</div>
<script>
// Swap button order based on device
var isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||window.innerWidth<768;
if(!isMobile){
  var r=document.getElementById('recommended');
  var a=document.getElementById('alt');
  r.innerHTML='💻 PC版を開く';r.href='pc.html';
  a.innerHTML='📱 スマホ版を開く';a.href='mobile.html';
}
</script>
</body>
</html>
